<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPLYT — You've Been Invited</title>
  <meta name="description" content="You've been invited to join a SPLYT — split the cost of an amazing water experience together.">
  <meta property="og:title" content="Join me on SPLYT!">
  <meta property="og:description" content="Split the cost of yacht charters, boat rentals, and water experiences with friends.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://splytyachts.com/app-icon.png">
  <meta property="og:site_name" content="SPLYT">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Join me on SPLYT!">
  <meta name="twitter:description" content="Split the cost of yacht charters and water experiences with friends.">
  <meta name="twitter:image" content="https://splytyachts.com/app-icon.png">
  <meta name="apple-itunes-app" content="app-id=6740092740">
  <link rel="icon" type="image/png" href="/app-icon.png">
  <link rel="apple-touch-icon" href="/app-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: linear-gradient(180deg, #0A1628 0%, #0F1923 50%, #0A1628 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    p { color: #8899AA; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #2196F3;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 48px;
      border-radius: 14px;
      transition: opacity 0.2s;
      width: 100%;
    }
    .btn:hover { opacity: 0.9; }
    .sub { color: #556677; font-size: 13px; margin-top: 16px; }
    .redirect-note { color: #556677; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⛵</div>
    <h1>You're Invited!</h1>
    <p>Someone wants you to join their SPLYT — split the cost of an amazing water experience together.</p>
    <a class="btn" href="https://apps.apple.com/app/splyt/id6740092740" data-track="invite_download_click">Get SPLYT on the App Store</a>
    <p class="sub">Open this link on your phone after installing to connect.</p>
    <p class="redirect-note" id="redirect-note">If the app didn't open, tap the button above to install it.</p>
  </div>

  <script>
    // Deep link fallback: if app is installed, iOS universal links will open it automatically.
    // If we reach this page, the app isn't installed — show fallback UI.
    var ua = navigator.userAgent || '';
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var isAndroid = /Android/i.test(ua);

    if (isIOS || isAndroid) {
      document.getElementById('redirect-note').style.display = 'block';
    }
  </script>

      person_profiles: 'identified_only'

    if (window.posthog) posthog.capture('deep_link_fallback', { type: 'invite', path: window.location.pathname });
