name: Scrape Airbnb Stays

on:
  schedule:
    # Once daily at 8 AM UTC (4 AM EST), offset from experiences scraper
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      city:
        description: "City to scrape (leave empty for all cities)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - miami
          - fort-lauderdale
          - tampa
          - new-york
          - los-angeles
          - san-diego
          - san-francisco
          - las-vegas
      limit:
        description: "Max listings per city"
        required: false
        default: "100"
        type: string
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          INPUT_CITY: ${{ inputs.city }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -n "$INPUT_CITY" ]; then
            ARGS="--city $INPUT_CITY"
          else
            ARGS="--all-cities"
          fi

          if [ -n "$INPUT_LIMIT" ]; then
            ARGS="$ARGS --limit $INPUT_LIMIT"
          fi

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python3 scripts/scrape-airbnb-stays.py $ARGS
